name: sharecrm-platform
label: 纷享销客 ShareCRM
kind: platform
version: 1.0.0
description: 纷享销客企信 IM Gateway 插件 for Hermes Agent
author: scutken
requires_env:
  - name: SHARECRM_APP_ID
    description: "应用 ID"
    prompt: "App ID"
    password: false
  - name: SHARECRM_APP_SECRET
    description: "应用密钥"
    prompt: "App Secret"
    password: true
optional_env:
  - name: SHARECRM_BASE_URL
    description: "接口地址（默认 https://open.fxiaoke.com）"
    prompt: "Base URL"
    password: false
  - name: SHARECRM_ALLOWED_USERS
    description: "允许的用户 ID，逗号分隔（如 E.fs.8017）"
    prompt: "Allowed users"
    password: false
  - name: SHARECRM_ALLOW_ALL_USERS
    description: "设为 true 允许所有用户（开发用）"
    prompt: "Allow all?"
    password: false
  - name: SHARECRM_HOME_CHANNEL
    description: "定时通知投递目标 chat_id"
    prompt: "Home channel"
    password: false
